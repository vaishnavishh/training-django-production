{% load static %}
<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>{% block title %}{% endblock title %} | SR POLYCLINIC</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous" />
        
        <link href="{% static 'css/base.css' %}" rel="stylesheet" />
    </head>
    <body class="d-flex flex-column min-vh-100">
        <nav class="navbar navbar-expand-lg navbar-scroll shadow-0" style="background-color: #ffede7">
            <div class="container">
                <a class="navbar-brand" href="/">VS HOMO</a>
                <button class="navbar-toggler ps-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarExample01" aria-controls="navbarExample01" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarExample01">
                    <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                        <li class="nav-item">
                            <a class="nav-link px-3" href="/home/">HOME</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link px-3" href="/products/">PRODUCTS</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link px-3" href="/about/">ABOUT</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link px-3" href="/contact/">CONTACT</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link px-3" href="/catalogue/">CATALOGUE</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link px-3" href="/login/">LOGIN</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link px-3" href="/signup/">SIGNUP</a>
                        </li>
                         <li class="nav-item">
                            <a class="nav-link px-3" href="/logout/">LOGOUT</a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>

        <main class="flex-grow-1">
            {% block content %} {% endblock content %}
        </main>

        <footer class="text-center text-lg-start text-white mt-auto" style="background-color: #1c2331">
            <section class="d-flex justify-content-between p-4" style="background-color: #6351ce">
                <div class="me-5">
                    <span>Get connected with us on social networks:</span>
                </div>
            </section>
            <div class="text-center p-3" style="background-color: rgba(0, 0, 0, 0.2)">
                © 2026 Copyright:
                <a class="text-white" href="https://mdbootstrap.com/">MDBootstrap.com</a>
            </div>
        </footer>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
    </body>
</html>
